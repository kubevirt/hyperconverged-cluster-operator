          value: ghcr.io/k8snetworkplumbingwg/multus-cni@sha256:3c20900b5381fac7f9cbbdfac8370ea10a2f6ed7fbecc678384a9db57047abb1
        - name: MULTUS_DYNAMIC_NETWORKS_CONTROLLER_IMAGE
