# This is a basic workflow to help you get started with Actions

name: Sanity Checks

# Controls when the action will run.
on:
  push:
    branches: [main]
    paths-ignore:
      - "renovate.json"
  pull_request:
    branches: [main]
    paths-ignore:
      - "renovate.json"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: Sanity Checks
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod # The Go version to download (if necessary) and use.

      - name: update KV feature gates file
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.HCO_BOT_TOKEN }}
        run: |
          KV_VERSION=$(grep "KUBEVIRT_VERSION=" hack/config | sed -E 's|^KUBEVIRT_VERSION="(.*)"$|\1|')
          gh release download "${KV_VERSION}" -R kubevirt/kubevirt -O pkg/internal/kvfeaturegates/kv-beta-feature-gates.json --pattern=feature-gates.json --clobber

      - name: Do sanity checks
        run: make sanity

      - name: Verify we can actually build the operator and some tools
        run: |
          make build
          make build-annotate-dicts

      - name: Unit tests
        run: make test-unit

      - name: Prometheus alerts tests
        run: make prom-rules-verify

      - name: Verify the current manifests pass validation
        run: make container-build-validate-bundles

  coverage:
    name: coverage test
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod # The Go version to download (if necessary) and use.

      - name: Unit tests
        run: make test-unit-coverage

      - name: Coveralls
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          file: coverprofiles/cover.coverprofile
          flag-name: Unit
          format: golang

  linters:
    name: linter Checks
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m
