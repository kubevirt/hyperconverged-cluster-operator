      spec:
        display:
          name: Virtual Machines List by Time In Status
        plugin:
          kind: Table
          spec:
            columnSettings:
            - hide: true
              name: timestamp
            - hide: true
              name: clusterID
            - hide: true
              name: container
            - hide: true
              name: endpoint
            - hide: true
              name: instance
            - hide: true
              name: job
