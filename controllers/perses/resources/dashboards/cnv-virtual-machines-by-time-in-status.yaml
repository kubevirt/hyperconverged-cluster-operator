                        ) and (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_error_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Error", "", ""))
                          < ($days_in_status_lt * 24 * 60 * 60)
                        ) and on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group="error"} > 0)
                        unless on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group=~"starting|running|non_running|migrating"} > 0)
                      )
                      or
                      (
                        (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_migrating_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Migrating", "", ""))
                          > ($days_in_status_gt * 24 * 60 * 60)
                        ) and (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_migrating_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Migrating", "", ""))
                          < ($days_in_status_lt * 24 * 60 * 60)
                        ) and on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group="migrating"} > 0)
                        unless on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group=~"starting|running|non_running|error"} > 0)
                      )
                    ) and on(name, namespace)
                    (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group=~"$status"} > 0))
                  )
  variables:
  - kind: ListVariable
    spec:
      allowAllValue: true
      allowMultiple: true
      customAllValue: .*
      defaultValue:
      - $__all
      display:
        description: Filter the virtual machine by the namespace.
        hidden: false
        name: Namespace
      name: namespace
      plugin:
        kind: PrometheusLabelValuesVariable
        spec:
          labelName: namespace
          matchers:
          - kubevirt_vm_info
  - kind: ListVariable
    spec:
      allowAllValue: true
      allowMultiple: true
      customAllValue: .*
      defaultValue:
      - $__all
      display:
        description: Filter the virtual machine by the name.
        hidden: false
        name: VM Name
      name: name
      plugin:
        kind: PrometheusLabelValuesVariable
        spec:
          labelName: name
          matchers:
          - kubevirt_vm_info{namespace=~"$namespace"}
  - kind: ListVariable
    spec:
      allowAllValue: true
      allowMultiple: false
      customAllValue: .*
      defaultValue: $__all
      display:
        description: Filter virtual machines by status
        hidden: false
        name: Status
      name: status
      plugin:
        kind: StaticListVariable
        spec:
          values:
          - label: Running
            value: running
          - label: Stopped
            value: non_running
          - label: Starting
            value: starting
          - label: Migrating
            value: migrating
          - label: Error
            value: error
  - kind: TextVariable
    spec:
      display:
        description: Filter the Virtual Machines that are in the specific status for
          more than the selected number of days
        hidden: false
        name: Days in Status >
      name: days_in_status_gt
      value: "0"
  - kind: TextVariable
    spec:
      display:
        description: Filter the Virtual Machines that are in the specific status for
          less than the selected number of days
        hidden: false
        name: Days in Status <
      name: days_in_status_lt
      value: "1000"
