              name: namespace
            - enableSorting: true
              header: VM Name
              name: name
            - hide: true
              name: pod
            - hide: true
              name: receive
            - hide: true
              name: service
            - enableSorting: true
              header: Status
              name: status
            - hide: true
              name: tenant_id
            - hide: true
              name: clusterType
            - enableSorting: true
              format:
                unit: decimal
              header: Allocated CPU
              name: 'value #6'
            - enableSorting: true
              format:
                shortValues: true
                unit: bytes
              header: Allocated Memory
              name: 'value #5'
            - enableSorting: true
              format:
                shortValues: true
                unit: bytes
              header: Allocated Disk
              name: 'value #1'
            - enableSorting: true
              format:
                unit: relative-time
              header: Time Since Last Migration
              name: 'value #3'
            - format:
                unit: datetime-local
              header: Last Migration
              hide: true
              name: 'value #4'
            - enableSorting: true
              format:
                unit: seconds
              header: Time in Status
              name: 'value #2'
            - hide: true
              name: __name__
            - hide: true
              name: guest_os_kernel_release
            - hide: true
              name: guest_os_machine
            - hide: true
              name: os
            - hide: true
              name: disk_name
            transforms:
            - kind: MergeSeries
              spec: {}
            - kind: JoinByColumnValue
              spec:
                columns:
                - name
                - namespace
        queries:
        - kind: TimeSeriesQuery
