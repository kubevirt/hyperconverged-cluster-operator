apiVersion: perses.dev/v1alpha1
kind: PersesDashboard
metadata:
  name: cnv-virtual-machines-by-time-in-status
  namespace: openshift-cnv
spec:
  display:
    name: OpenShift Virtualization / Virtual Machines Time in Status
  duration: 1h
  layouts:
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Time In Status
      items:
      - content:
          $ref: '#/spec/panels/0_0'
        height: 3
        width: 8
        x: 0
        "y": 0
      - content:
          $ref: '#/spec/panels/0_1'
        height: 3
        width: 8
        x: 8
        "y": 0
      - content:
          $ref: '#/spec/panels/0_2'
        height: 3
        width: 8
        x: 16
        "y": 0
      - content:
          $ref: '#/spec/panels/0_3'
        height: 16
        width: 24
        x: 0
        "y": 3
  panels:
    "0_0":
      kind: Panel
      spec:
        display:
          description: The total CPUs of the VMs that are listed in the dashboard
          name: Total Allocated CPU
        plugin:
          kind: StatChart
          spec:
            calculation: last-number
            colorMode: none
            format:
              unit: decimal
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: |-
                  sum (
                  max by (namespace, name)((
                  sum by (namespace, name)(kubevirt_vm_resource_requests{name=~"$name", namespace=~"$namespace", resource="cpu", unit="cores", source="guest_effective"})
                  or
                  sum by (namespace, name)(
                  (kubevirt_vm_resource_requests{name=~"$name", namespace=~"$namespace", resource="cpu", unit="cores", source=~"default|domain"})
                  * ignoring (unit)(kubevirt_vm_resource_requests{name=~"$name", namespace=~"$namespace", resource="cpu", unit="sockets", source=~"default|domain"})
                  * ignoring (unit)(kubevirt_vm_resource_requests{name=~"$name", namespace=~"$namespace", resource="cpu", unit="threads", source=~"default|domain"})
                  ) or
                  sum by (namespace, name)(
                  (kubevirt_vm_resource_requests{name=~"$name", namespace=~"$namespace", resource="cpu", unit="cores", source=~"default|domain"})
                  * ignoring (unit)(kubevirt_vm_resource_requests{name=~"$name", namespace=~"$namespace", resource="cpu", unit="sockets", source=~"default|domain"})
                  ) or
                  sum by (namespace, name)(
                  kubevirt_vm_resource_requests{name=~"$name", namespace=~"$namespace", resource="cpu", unit="cores", source=~"default|domain"})
                  ))

                    + on(name, namespace) group_left(status)
                    (0 * (
                      (
                        (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_starting_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Starting", "", ""))
                          > ($days_in_status_gt * 24 * 60 * 60)
                        ) and (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_starting_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Starting", "", ""))
                          < ($days_in_status_lt * 24 * 60 * 60)
                        ) and on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group="starting"} > 0)
                        unless on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group=~"running|non_running|error|migrating"} > 0)
                      )
                      or
                      (
                        (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_running_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Running", "", ""))
                          > ($days_in_status_gt * 24 * 60 * 60)
                        ) and (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_running_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Running", "", ""))
                          < ($days_in_status_lt * 24 * 60 * 60)
                        ) and on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group="running"} > 0)
                        unless on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group=~"starting|non_running|error|migrating"} > 0)
                      )
                      or
                      (
                        (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_non_running_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Stopped", "", ""))
                          > ($days_in_status_gt * 24 * 60 * 60)
                        ) and (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_non_running_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Stopped", "", ""))
                          < ($days_in_status_lt * 24 * 60 * 60)
                        ) and on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group="non_running"} > 0)
                        unless on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group=~"starting|running|error|migrating"} > 0)
                      )
                      or
                      (
                        (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_error_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Error", "", ""))
                          > ($days_in_status_gt * 24 * 60 * 60)
                        ) and (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_error_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Error", "", ""))
                          < ($days_in_status_lt * 24 * 60 * 60)
                        ) and on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group="error"} > 0)
                        unless on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group=~"starting|running|non_running|migrating"} > 0)
                      )
                      or
                      (
                        (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_migrating_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Migrating", "", ""))
                          > ($days_in_status_gt * 24 * 60 * 60)
                        ) and (
                          (time() - label_replace(max by (name, namespace)(kubevirt_vm_migrating_status_last_transition_timestamp_seconds{name=~"$name", namespace=~"$namespace"}) > 0, "status", "Migrating", "", ""))
                          < ($days_in_status_lt * 24 * 60 * 60)
                        ) and on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group="migrating"} > 0)
                        unless on(name, namespace)
                        (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group=~"starting|running|non_running|error"} > 0)
                      )
                    ) and on(name, namespace)
                    (kubevirt_vm_info{name=~"$name", namespace=~"$namespace", status_group=~"$status"} > 0))
                  ) or vector(0)
