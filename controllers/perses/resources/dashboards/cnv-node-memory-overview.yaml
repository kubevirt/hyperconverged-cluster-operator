            yAxis:
              format:
                unit: percent-decimal
              show: true
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: |-
                  topk(5, (
                  sum by (node) (container_memory_rss{cgroup_id="/system.slice"})

                  / on (node)

                  (
                  sum by (node) ((kube_node_status_capacity{resource="memory", node=~"$node"} * on (node) kube_node_role{role="$role", node=~"$node"}))
                  -
                  sum by (node) ((kube_node_status_allocatable{resource="memory", node=~"$node"} * on (node) kube_node_role{role="$role", node=~"$node"}))
                  )
                  ))
                seriesNameFormat: '{{node}}'
