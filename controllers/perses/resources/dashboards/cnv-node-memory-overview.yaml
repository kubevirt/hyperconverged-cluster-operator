    "3_0":
      kind: Panel
      spec:
        display:
          description: This graph is showing the utilization of the hypervisor system
            reserved memory. The utilization must stay below 100%, otherwise the hypervisor
            is using more memory for system processes than what was reserved. This
            is putting system processes at risk.
          name: Utilization - Reserved System Memory
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              mode: list
              position: bottom
            thresholds:
              steps:
              - value: 0.9
