                seriesNameFormat: '{{node}}'
  variables:
  - kind: ListVariable
    spec:
      allowAllValue: true
      allowMultiple: false
      customAllValue: .*
      defaultValue: $__all
      display:
        hidden: false
        name: Node
      name: node
      plugin:
        kind: PrometheusLabelValuesVariable
        spec:
          labelName: node
          matchers:
          - kube_node_role
  - kind: ListVariable
    spec:
      allowAllValue: false
      allowMultiple: false
      defaultValue: worker
      display:
        hidden: false
        name: role
      name: role
      plugin:
        kind: PrometheusPromQLVariable
        spec:
          expr: kube_node_role
          labelName: role
