              kind: PrometheusTimeSeriesQuery
              spec:
                query: |-
                  avg(
                  (
                  (label_replace(max by (namespace, name)(kubevirt_vmi_memory_domain_bytes), "label_vm_kubevirt_io_name", "$1", "name", "(.+)"))
                  + on(name, namespace) group_left() max by (name, namespace)(kubevirt_vmi_launcher_memory_overhead_bytes)
                  )

                  / on (namespace, label_vm_kubevirt_io_name) group_left()

                  max by (namespace, label_vm_kubevirt_io_name) (
                    group by(namespace, pod, label_vm_kubevirt_io_name) (
                      kube_pod_labels{label_vm_kubevirt_io_name!=""}
                    )
                    * on(namespace, pod) group_left()
                    max by (namespace, pod) (kube_pod_resource_request{resource="memory"})
                  )
                  )
                seriesNameFormat: Average VM overcommit ratio
